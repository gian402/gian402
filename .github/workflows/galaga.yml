  name: Generate Galaga Contribution Graph
  
  on:
    schedule:
      - cron: "0 */12 * * *"
    workflow_dispatch:
  
  jobs:
    generate:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
  
        - uses: Platane/snk@v3
          with:
            github_user_name: gian402
            outputs: |
              dist/galaga-contribution-graph.svg?palette=github
              dist/galaga-contribution-graph-dark.svg?palette=github-dark&animate=true
            game: galaga
  
        - uses: crazy-max/ghaction-github-pages@v4
          with:
            target_branch: pacman-output
            build_dir: dist
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
